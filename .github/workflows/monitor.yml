name: SA Games Monitor — Atualização de Preços

on:
  schedule:
    - cron: '0 * * * *'   # A cada hora (ex: 12:00, 13:00, 14:00...)
  workflow_dispatch:        # Permite disparo manual pelo botão no GitHub

permissions:
  contents: write           # Necessário para commitar a planilha atualizada

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20     # Cancela se demorar mais que 20 min

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Baixa o código do repositório
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Configura Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Instala dependências (sem baixar o Chromium do Puppeteer — usa Chrome do sistema)
      - name: 📦 Instalar dependências
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: npm install

      # 4. Localiza o Chrome instalado no runner Ubuntu
      - name: 🔍 Localizar Chrome
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium-browser 2>/dev/null || echo "")
          if [ -z "$CHROME" ]; then
            echo "Chrome não encontrado, instalando..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq google-chrome-stable
            CHROME=$(which google-chrome-stable)
          fi
          echo "Chrome encontrado: $CHROME"
          echo "PUPPETEER_EXECUTABLE_PATH=$CHROME" >> $GITHUB_ENV

      # 5. Roda o bot
      - name: 🤖 Rodar bot de monitoramento
        env:
          SITEMAP_URL: ${{ secrets.SITEMAP_URL }}
          BATCH_SIZE: '8'
          STOCK_IN_VALUE: '10'
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
        run: node scripts/run-once.js

      # 6. Commita a planilha atualizada de volta ao repositório
      - name: 💾 Salvar planilha atualizada no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/planilha-atualizada.csv output/updates.json || true
          if git diff --staged --quiet; then
            echo "📋 Nenhuma alteração detectada."
          else
            git commit -m "bot: planilha atualizada — $(date -u +'%d/%m/%Y %H:%M UTC')"
            git push
            echo "✅ Planilha commitada com sucesso!"
          fi
